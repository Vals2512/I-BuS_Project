{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Eliminar Detalle de Ruta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="container py-4">
    <h2 class="mb-4 text-danger">Eliminar Detalle de Ruta</h2>

    <div class="alert alert-warning" role="alert">
        ¿Está seguro que desea eliminar el detalle de la ruta <strong>{{ detalle.idRuta }}</strong> con fecha
        <strong>{{ detalle.idTiempo.fecha }}</strong>?
    </div>

    <form method="post" class="d-inline">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
    </form>
    <a href="{% url 'lista_detalles_rutas' %}" class="btn btn-secondary ms-2">Cancelar</a>
</body>

</html>
