{% extends 'base.html' %}

{% block content %}
<h2>{{ accion }} Empresa</h2>
<form method="post" class="mt-3">
    {% csrf_token %}
    {{ form.as_p }}

    <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn btn-primary">
            {% if accion == 'Editar' %}Actualizar{% else %}Crear{% endif %}
        </button>
        <a href="{% url 'lista_empresas' %}" class="btn btn-secondary">Volver</a>
    </div>
</form>
{% endblock %}
