{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Buscar Rutas por Barrio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light p-5">
    <div class="container bg-white shadow p-4 rounded">
        <h2 class="mb-4">Buscar Rutas por Barrio</h2>

        <div class="form-group mb-3">
            <label for="barrio_id">Seleccione un barrio:</label>
            <select id="barrio_id" class="form-control">
                <option value="">-- Seleccione --</option>
                {% for barrio in barrios %}
                <option value="{{ barrio.idBarrio }}">{{ barrio.nombreBarrio }}</option>
                {% endfor %}
            </select>
        </div>

        <div id="rutas-container" class="mt-4">
            <!-- Aquí se cargan las rutas vía JS -->
        </div>
    </div>

    <script>
        document.getElementById('barrio_id').addEventListener('change', function () {
            const barrioId = this.value;
            const rutasContainer = document.getElementById('rutas-container');
            rutasContainer.innerHTML = '';

            if (barrioId) {
                fetch(`/api/obtener-rutas/?barrio_id=${barrioId}`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.rutas.length > 0) {
                            const ul = document.createElement('ul');
                            ul.className = 'list-group';

                            data.rutas.forEach(ruta => {
                                const li = document.createElement('li');
                                li.className = 'list-group-item';
                                li.textContent = ruta.descripcion;
                                ul.appendChild(li);
                            });

                            rutasContainer.appendChild(ul);
                        } else {
                            rutasContainer.innerHTML = '<p class="text-muted">No se encontraron rutas para este barrio.</p>';
                        }
                    });
            }
        });
    </script>
</body>

</html>
