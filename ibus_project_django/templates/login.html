<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login IBuS</title>
    <style>
        body {
            background: linear-gradient(135deg, #6b73ff 0%, #000dff 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background: #fff;
            padding: 2rem 3rem;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            width: 320px;
            text-align: center;
        }

        h2 {
            margin-bottom: 1.5rem;
            color: #333;
            font-weight: 700;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input[type="email"],
        input[type="password"] {
            padding: 12px 15px;
            margin-bottom: 1rem;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #000dff;
            box-shadow: 0 0 5px #000dff;
        }

        button {
            padding: 12px;
            background: #000dff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #3949ff;
        }

        p.error-message {
            color: #ff3b3b;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        a.register-link {
            display: inline-block;
            margin-top: 1rem;
            color: #000dff;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        a.register-link:hover {
            color: #3949ff;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h2>Iniciar sesión en IBuS</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.email }}
            {{ form.contrasena }}
            <button type="submit">Ingresar</button>
        </form>
        {% if error %}
        <p class="error-message">{{ error }}</p>
        {% endif %}
        <a href="{% url 'registrar_usuario' %}" class="register-link">¿No tienes cuenta? Regístrate</a>
    </div>
</body>

</html>
