{% extends 'base.html' %}
{% block content %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">{{ accion }}</button>
    <a href="{% url 'listar_tiempos' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
