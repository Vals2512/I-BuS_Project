{% extends 'base.html' %}
{% block content %}
<h2>¿Eliminar Ruta?</h2>
<p>¿Estás seguro de que deseas eliminar la ruta de <strong>{{ ruta.inicioRuta }}</strong> a <strong>{{ ruta.destinoRuta
        }}</strong> de la empresa <strong>{{ ruta.idEmpresa.nombreEmpresa }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
    <a href="{% url 'lista_rutas' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
