{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Eliminar Cuenta - IBuS</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
        body {
            background-color: #f0f4fb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            max-width: 450px;
            width: 100%;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgb(11 61 145 / 0.15);
            background: white;
            text-align: center;
        }

        h2 {
            color: #b00020;
            font-weight: 700;
            margin-bottom: 25px;
        }

        p {
            font-size: 1.1em;
            margin-bottom: 30px;
            color: #333;
        }

        .btn-danger {
            background-color: #b00020;
            border: none;
            min-width: 120px;
        }

        .btn-danger:hover {
            background-color: #7a0015;
        }

        .btn-secondary {
            min-width: 120px;
        }

        .btn-group {
            gap: 15px;
            justify-content: center;
        }

        a.back-link {
            display: block;
            margin-top: 20px;
            color: #0b3d91;
            font-weight: 600;
            text-decoration: none;
        }

        a.back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Confirmar Eliminación</h2>
        <p>¿Está seguro que desea eliminar su cuenta? Esta acción no se puede deshacer.</p>

        <form method="post">
            {% csrf_token %}
            <div class="btn-group d-flex">
                <button type="submit" class="btn btn-danger">Eliminar</button>
                <a href="{% url 'usuario_dashboard' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>

        <a href="{% url 'usuario_dashboard' %}" class="back-link">← Volver al panel</a>
    </div>

    <!-- Bootstrap JS y dependencias -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
