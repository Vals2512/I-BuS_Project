{% extends 'base.html' %}

{% block content %}
<h2>Usuarios registrados</h2>
<a href="{% url 'admin_dashboard' %}" class="btn btn-secondary mb-3">Volver al Panel</a>
<table class="table table-hover">
    <thead>
        <tr>
            <th>Email</th>
            <th>Tipo</th>
        </tr>
    </thead>
    <tbody>
        {% for u in usuarios %}
        <tr>
            <td>{{ u.email }}</td>
            <td>{{ u.idTipoUsuario.nombreTipo }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
