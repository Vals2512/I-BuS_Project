{% extends 'base.html' %}

{% block content %}
<h2>Confirmar eliminación</h2>
<p>¿Seguro que deseas eliminar la empresa <strong>{{ empresa.nombreEmpresa }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Eliminar</button>
    <a href="{% url 'lista_empresas' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
