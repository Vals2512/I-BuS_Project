<div class="w-full min-h-screen bg-ibus-blue flex flex-col relative font-roboto text-white pb-12">
  
  <!-- Top White Area (Full Width) -->
  <div class="bg-white pt-10 pb-4 w-full relative md:pt-16">
    <div class="relative w-full max-w-[420px] mx-auto flex justify-center items-center px-6">
      <!-- Back Arrow (Goes back to route search/map) -->
      <a routerLink="/usuario/buscar-rutas" class="absolute left-6 cursor-pointer text-ibus-light-blue hover:text-ibus-yellow transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
      </a>

      <!-- Logo Title -->
      <h2 class="font-barlow font-black text-[38px] text-ibus-light-blue tracking-wide mt-2 md:text-[44px]">I-BuS</h2>
    </div>
  </div>
  
  <!-- Wave Divider (Full Width) -->
  <div class="bg-white relative h-[100px] w-full -mt-[1px] md:h-[130px]">
    <svg class="absolute bottom-0 w-full h-full" viewBox="0 0 1440 200" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <path d="M0,80 C360,180 720,20 1080,130 C1260,170 1350,190 1440,170 L1440,200 L0,200 Z" fill="#175AA5" opacity="0.4"/>
      <path d="M0,110 C360,190 720,60 1080,150 C1260,180 1350,195 1440,185 L1440,200 L0,200 Z" fill="#175AA5" opacity="0.8"/>
      <path d="M0,140 C360,210 720,110 1080,170 L1440,200 L0,200 Z" fill="#081E37"/>
    </svg>
  </div>

  <!-- Bottom Dark Blue Area (Full Width) -->
  <div class="flex-1 bg-ibus-blue px-6 pb-12 flex flex-col justify-between -mt-6 z-10 md:pb-16">
    
    <div class="w-full max-w-[420px] mx-auto flex flex-col">
      <!-- Title -->
      <h1 class="font-barlow font-extrabold text-[28px] text-ibus-yellow text-center mb-8 tracking-wide">
        Ajustes
      </h1>

      <!-- Options container -->
      <div class="flex flex-col gap-6 w-full">
        
        <!-- SECTION: Accesibilidad -->
        <div>
          <!-- Section title -->
          <div class="font-inter font-bold text-[15px] text-ibus-yellow flex items-center gap-2.5 mb-2">
            <svg class="w-5 h-5 text-ibus-yellow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4a4 4 0 100 8 4 4 0 000-8zm-2 8a4 4 0 00-4 4v2h12v-2a4 4 0 00-4-4h-4z" />
            </svg>
            <span>Accesibilidad</span>
          </div>
          <p class="font-inter text-[12px] text-white/60 mb-5 leading-normal">
            Configura la visualización según tus necesidades visuales.
          </p>

          <!-- Text size setting -->
          <div class="flex flex-col gap-2 mb-6">
            <span class="font-inter text-[14px] text-white/90 font-medium">Tamaño de texto</span>
            <div class="relative w-full mt-1">
              <input type="range" min="1" max="100" [(ngModel)]="tamanoTexto"
                class="w-full h-1.5 bg-white/20 rounded-lg appearance-none cursor-pointer accent-ibus-yellow">
              <div class="flex justify-between items-baseline mt-1.5 text-white/70 font-inter font-bold">
                <span class="text-[12px]">A</span>
                <span class="text-[16px]">A</span>
                <span class="text-[22px]">A</span>
              </div>
            </div>
          </div>

          <!-- Contrast toggle -->
          <div class="flex items-center justify-between py-2.5 border-b border-white/10">
            <div class="flex items-center gap-3">
              <svg class="w-5 h-5 text-white/60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
              </svg>
              <span class="font-inter text-[14px] text-white/90">Alto Contraste</span>
            </div>
            <!-- Custom Toggle -->
            <button type="button" (click)="toggleContraste()"
              class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none"
              [ngClass]="altoContraste ? 'bg-ibus-yellow' : 'bg-white/20'">
              <span class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out"
                [ngClass]="altoContraste ? 'translate-x-5' : 'translate-x-0'"></span>
            </button>
          </div>

          <!-- Dark mode toggle -->
          <div class="flex items-center justify-between py-2.5 border-b border-white/10">
            <div class="flex items-center gap-3">
              <svg class="w-5 h-5 text-white/60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
              </svg>
              <span class="font-inter text-[14px] text-white/90">Modo Oscuro</span>
            </div>
            <!-- Custom Toggle -->
            <button type="button" (click)="toggleOscuro()"
              class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none"
              [ngClass]="modoOscuro ? 'bg-ibus-yellow' : 'bg-white/20'">
              <span class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out"
                [ngClass]="modoOscuro ? 'translate-x-5' : 'translate-x-0'"></span>
            </button>
          </div>

        </div>

        <!-- SECTION: General -->
        <div>
          <!-- Section title -->
          <div class="font-inter font-bold text-[15px] text-ibus-yellow flex items-center gap-2.5 mb-4">
            <svg class="w-5 h-5 text-ibus-yellow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <span>General</span>
          </div>

          <!-- Notifications toggle -->
          <div class="flex items-center justify-between py-2.5 border-b border-white/10">
            <span class="font-inter text-[14px] text-white/90">Notificaciones</span>
            <!-- Custom Toggle -->
            <button type="button" (click)="toggleNotificaciones()"
              class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none"
              [ngClass]="notificaciones ? 'bg-ibus-yellow' : 'bg-white/20'">
              <span class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out"
                [ngClass]="notificaciones ? 'translate-x-5' : 'translate-x-0'"></span>
            </button>
          </div>

          <!-- Language link -->
          <div class="flex items-center justify-between py-3 border-b border-white/10 cursor-pointer group">
            <span class="font-inter text-[14px] text-white/90">Idioma</span>
            <span class="font-inter text-[14px] text-ibus-yellow font-bold group-hover:underline">Español &gt;</span>
          </div>

          <!-- Help and Support link -->
          <div class="flex items-center justify-between py-3 border-b border-white/10 cursor-pointer group">
            <div class="flex items-center gap-3">
              <svg class="w-5 h-5 text-white/60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              <span class="font-inter text-[14px] text-white/90">Ayuda y Soporte</span>
            </div>
            <div class="text-white/40">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
              </svg>
            </div>
          </div>

          <!-- Terms link -->
          <div class="flex items-center justify-between py-3 border-b border-white/10 cursor-pointer group">
            <div class="flex items-center gap-3">
              <svg class="w-5 h-5 text-white/60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
              </svg>
              <span class="font-inter text-[14px] text-white/90">Términos y Condiciones</span>
            </div>
            <div class="text-white/40">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
              </svg>
            </div>
          </div>

        </div>

      </div>

      <!-- Footer Version details -->
      <div class="flex flex-col items-center mt-12 text-center text-[12px] text-white/40 font-inter leading-relaxed">
        <span>I - BuS Versión 1.0.0</span>
        <span>Sogamoso, 2025</span>
      </div>

    </div>

  </div>

</div>
