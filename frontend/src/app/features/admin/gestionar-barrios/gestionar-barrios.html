<div class="w-full min-h-screen bg-ibus-blue flex flex-col relative font-roboto text-white">
  
  <!-- Top White Area (Full Width) -->
  <div class="bg-white pt-10 pb-4 w-full relative md:pt-16">
    <div class="relative w-full max-w-[420px] mx-auto flex justify-center items-center px-6">
      <!-- Back Arrow -->
      <a routerLink="/admin/dashboard" class="absolute left-6 cursor-pointer text-ibus-light-blue hover:text-ibus-yellow transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
      </a>

      <!-- Logo Title -->
      <h2 class="font-barlow font-black text-[38px] text-ibus-light-blue tracking-wide md:text-[44px]">I-BuS</h2>
    </div>
  </div>
  
  <!-- Wave Divider (Full Width) -->
  <div class="bg-white relative h-[100px] w-full -mt-[1px] md:h-[130px]">
    <svg class="absolute bottom-0 w-full h-full" viewBox="0 0 1440 200" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <path d="M0,80 C360,180 720,20 1080,130 C1260,170 1350,190 1440,170 L1440,200 L0,200 Z" fill="#175AA5" opacity="0.4"/>
      <path d="M0,110 C360,190 720,60 1080,150 C1260,180 1350,195 1440,185 L1440,200 L0,200 Z" fill="#175AA5" opacity="0.8"/>
      <path d="M0,140 C360,210 720,110 1080,170 L1440,200 L0,200 Z" fill="#081E37"/>
    </svg>
  </div>

  <!-- Bottom Dark Blue Area (Full Width) -->
  <div class="flex-1 bg-ibus-blue px-6 pb-12 flex flex-col justify-between -mt-6 z-10 md:pb-16">
    
    <div class="w-full max-w-[420px] mx-auto flex flex-col">
      <!-- Title -->
      <h1 class="font-barlow font-extrabold text-[26px] text-ibus-yellow text-center mb-6 tracking-wide md:text-[30px]">
        Gestionar Barrios
      </h1>

      <form [formGroup]="barrioForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6 w-full">
        
        <!-- Search Row -->
        <div class="flex items-center gap-3 w-full mb-2">
          <!-- Search input -->
          <div class="flex-1 flex items-center border border-white/40 rounded-lg h-[46px] px-3 bg-transparent">
            <input formControlName="buscar" type="text" placeholder="Buscar Barrio"
              class="w-full bg-transparent text-white font-roboto text-[14px] focus:outline-none placeholder-white/40 pr-2">
            <div class="text-white/60 cursor-pointer">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
              </svg>
            </div>
          </div>
          <!-- Add Button -->
          <button type="button" class="h-[46px] px-4 bg-ibus-yellow text-ibus-blue font-inter font-bold text-[14px] rounded-lg hover:bg-opacity-90 active:scale-95 transition-all whitespace-nowrap">
            + Barrio
          </button>
        </div>

        <!-- Inputs Row 1 (Id Barrio & Nombre) -->
        <div class="grid grid-cols-2 gap-4">
          <!-- Id Barrio -->
          <div class="relative w-full">
            <label class="absolute -top-[10px] left-3 bg-ibus-blue px-2 font-roboto font-bold text-[11px] text-white/80 tracking-[0.4px] z-10">
              Id Barrio
            </label>
            <div class="flex items-center border border-white/40 rounded-lg h-[50px] relative z-0">
              <input formControlName="idBarrio" type="text"
                class="w-full bg-transparent text-white font-roboto text-[14px] focus:outline-none px-4">
            </div>
          </div>
          
          <!-- Nombre Barrio -->
          <div class="relative w-full">
            <label class="absolute -top-[10px] left-3 bg-ibus-blue px-2 font-roboto font-bold text-[11px] text-white/80 tracking-[0.4px] z-10">
              Nombre Barrio
            </label>
            <div class="flex items-center border border-white/40 rounded-lg h-[50px] relative z-0">
              <input formControlName="nombreBarrio" type="text"
                class="w-full bg-transparent text-white font-roboto text-[14px] focus:outline-none px-4">
            </div>
          </div>
        </div>

        <!-- Rutas Asignadas Area -->
        <div class="relative w-full">
          <label class="absolute -top-[10px] left-3 bg-ibus-blue px-2 font-roboto font-bold text-[11px] text-white/80 tracking-[0.4px] z-10">
            Rutas Asignadas
          </label>
          <div class="flex flex-wrap items-center gap-2 border border-white/40 rounded-lg min-h-[50px] relative z-0 p-3">
            
            <!-- Chips for assigned routes -->
            @for (ruta of rutasAsignadas; track $index) {
              <div class="flex items-center gap-1.5 bg-white/10 hover:bg-white/20 transition-colors border border-white/20 rounded-full pl-3 pr-2 py-1">
                <span class="font-inter text-[12px] text-white font-semibold">{{ ruta }}</span>
                <button type="button" (click)="quitarRuta($index)" class="text-white/60 hover:text-ibus-red active:scale-90 transition-all font-bold text-[12px] flex items-center justify-center w-4 h-4 rounded-full bg-black/10">
                  ×
                </button>
              </div>
            }

            <!-- Add Plus Button inside border -->
            <button type="button" (click)="agregarRuta()" class="w-7 h-7 rounded-full bg-white/5 border border-white/20 flex items-center justify-center text-white/80 hover:bg-white/10 hover:text-white active:scale-95 transition-all">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
              </svg>
            </button>

          </div>
        </div>

        <!-- Editar ubicación box -->
        <div class="w-full border border-white/20 rounded-xl bg-white/5 py-6 px-4 flex flex-col items-center justify-center gap-2 cursor-pointer hover:bg-white/10 transition-colors mt-2">
          <svg class="w-7 h-7 text-white/80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          <span class="font-inter text-[14px] text-white/80 font-medium">Editar ubicación del barrio</span>
        </div>

        <!-- Action Buttons -->
        <div class="flex justify-between items-center w-full mt-6 gap-4">
          <!-- Actualizar -->
          <button type="submit" class="flex-1 py-3 rounded-lg font-barlow font-bold text-[15px] bg-ibus-yellow text-ibus-blue hover:bg-opacity-95 active:scale-95 transition-all text-center">
            Actualizar Barrio
          </button>
          
          <!-- Eliminar -->
          <button type="button" (click)="onEliminar()" class="px-6 py-3 rounded-lg font-barlow font-bold text-[15px] bg-ibus-red text-ibus-dark-red hover:bg-opacity-95 active:scale-95 transition-all flex justify-center items-center">
            <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
            <span>Eliminar</span>
          </button>
        </div>

      </form>
    </div>

  </div>

</div>
