<div class="w-full min-h-screen bg-ibus-blue flex flex-col relative font-roboto text-white">
  
  <!-- Top White Area (Full Width) -->
  <div class="bg-white pt-10 pb-4 w-full relative md:pt-16">
    <div class="relative w-full max-w-[420px] mx-auto flex justify-center items-center px-6">
      <!-- Back Arrow -->
      <a routerLink="/admin/dashboard" class="absolute left-6 cursor-pointer text-ibus-light-blue hover:text-ibus-yellow transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
      </a>

      <!-- Logo Title -->
      <h2 class="font-barlow font-black text-[38px] text-ibus-light-blue tracking-wide md:text-[44px]">I-BuS</h2>
    </div>
  </div>
  
  <!-- Wave Divider (Full Width) -->
  <div class="bg-white relative h-[100px] w-full -mt-[1px] md:h-[130px]">
    <svg class="absolute bottom-0 w-full h-full" viewBox="0 0 1440 200" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <path d="M0,80 C360,180 720,20 1080,130 C1260,170 1350,190 1440,170 L1440,200 L0,200 Z" fill="#175AA5" opacity="0.4"/>
      <path d="M0,110 C360,190 720,60 1080,150 C1260,180 1350,195 1440,185 L1440,200 L0,200 Z" fill="#175AA5" opacity="0.8"/>
      <path d="M0,140 C360,210 720,110 1080,170 L1440,200 L0,200 Z" fill="#081E37"/>
    </svg>
  </div>

  <!-- Bottom Dark Blue Area (Full Width) -->
  <div class="flex-1 bg-ibus-blue px-6 pb-12 flex flex-col justify-between -mt-6 z-10 md:pb-16">
    
    <div class="w-full max-w-[420px] mx-auto flex flex-col">
      <!-- Title -->
      <h1 class="font-barlow font-extrabold text-[26px] text-ibus-yellow text-center mb-6 tracking-wide md:text-[30px]">
        Estadísticas
      </h1>

      <!-- Stats Grid -->
      <div class="grid grid-cols-2 gap-4 w-full mb-6">
        
        <!-- Total Rutas -->
        <div class="border border-white/20 rounded-xl p-4 bg-white/5 flex flex-col justify-between h-[100px]">
          <span class="font-inter text-[12px] text-white/60">Total Rutas</span>
          <div class="flex items-baseline justify-between mt-2">
            <span class="font-inter font-extrabold text-[28px] text-white">{{ totalRutas }}</span>
            <div class="text-ibus-yellow">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
              </svg>
            </div>
          </div>
        </div>

        <!-- Total Barrios -->
        <div class="border border-white/20 rounded-xl p-4 bg-white/5 flex flex-col justify-between h-[100px]">
          <span class="font-inter text-[12px] text-white/60">Total Barrios</span>
          <div class="flex items-baseline justify-between mt-2">
            <span class="font-inter font-extrabold text-[28px] text-white">{{ totalBarrios }}</span>
            <div class="text-ibus-yellow">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
              </svg>
            </div>
          </div>
        </div>

        <!-- Total Empresas -->
        <div class="border border-white/20 rounded-xl p-4 bg-white/5 flex flex-col justify-between h-[100px]">
          <span class="font-inter text-[12px] text-white/60">Total Empresas</span>
          <div class="flex items-baseline justify-between mt-2">
            <span class="font-inter font-extrabold text-[28px] text-white">{{ totalEmpresas }}</span>
            <div class="text-ibus-yellow">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
            </div>
          </div>
        </div>

        <!-- Usuarios Activos -->
        <div class="border border-white/20 rounded-xl p-4 bg-white/5 flex flex-col justify-between h-[100px]">
          <span class="font-inter text-[12px] text-white/60">Usuarios Activos</span>
          <div class="flex items-baseline justify-between mt-2">
            <span class="font-inter font-extrabold text-[24px] text-white">{{ usuariosActivos }}</span>
            <div class="text-ibus-yellow">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
              </svg>
            </div>
          </div>
        </div>

      </div>

      <!-- Pure CSS/SVG Bar Chart Card -->
      <div class="border border-white/20 rounded-xl p-5 bg-white/5 w-full mb-6">
        <h3 class="font-inter font-bold text-[14px] text-white/95 mb-4">Uso de Rutas por Día (Consultas)</h3>
        
        <div class="flex items-end justify-between h-[150px] w-full pt-4 px-2 border-b border-white/20 relative">
          <!-- Bars -->
          <div class="flex flex-col items-center w-8">
            <div class="w-4 bg-ibus-yellow rounded-t h-[60px]"></div>
            <span class="text-[10px] text-white/60 mt-1">Lun</span>
          </div>
          <div class="flex flex-col items-center w-8">
            <div class="w-4 bg-ibus-yellow rounded-t h-[80px]"></div>
            <span class="text-[10px] text-white/60 mt-1">Mar</span>
          </div>
          <div class="flex flex-col items-center w-8">
            <div class="w-4 bg-ibus-yellow rounded-t h-[110px]"></div>
            <span class="text-[10px] text-white/60 mt-1">Mié</span>
          </div>
          <div class="flex flex-col items-center w-8">
            <div class="w-4 bg-ibus-yellow rounded-t h-[95px]"></div>
            <span class="text-[10px] text-white/60 mt-1">Jue</span>
          </div>
          <div class="flex flex-col items-center w-8">
            <div class="w-4 bg-ibus-yellow rounded-t h-[130px]"></div>
            <span class="text-[10px] text-white/60 mt-1">Vie</span>
          </div>
          <div class="flex flex-col items-center w-8">
            <div class="w-4 bg-ibus-light-blue rounded-t h-[50px]"></div>
            <span class="text-[10px] text-white/60 mt-1">Sáb</span>
          </div>
          <div class="flex flex-col items-center w-8">
            <div class="w-4 bg-ibus-light-blue rounded-t h-[30px]"></div>
            <span class="text-[10px] text-white/60 mt-1">Dom</span>
          </div>
        </div>
      </div>

      <!-- Capacity Progress utilization -->
      <div class="border border-white/20 rounded-xl p-5 bg-white/5 w-full">
        <h3 class="font-inter font-bold text-[14px] text-white/95 mb-3">Eficiencia de Cobertura</h3>
        <div class="flex flex-col gap-3">
          <div>
            <div class="flex justify-between text-[11px] text-white/60 mb-1">
              <span>Ruta 10 - Universitaria</span>
              <span class="font-bold text-white">82%</span>
            </div>
            <div class="w-full bg-white/10 h-2 rounded-full overflow-hidden">
              <div class="bg-ibus-yellow h-full" style="width: 82%"></div>
            </div>
          </div>
          <div>
            <div class="flex justify-between text-[11px] text-white/60 mb-1">
              <span>Ruta 5 - Hospital</span>
              <span class="font-bold text-white">56%</span>
            </div>
            <div class="w-full bg-white/10 h-2 rounded-full overflow-hidden">
              <div class="bg-ibus-light-blue h-full" style="width: 56%"></div>
            </div>
          </div>
        </div>
      </div>

    </div>

  </div>

</div>
