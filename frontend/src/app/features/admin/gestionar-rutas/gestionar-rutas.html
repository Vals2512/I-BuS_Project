<div class="w-full min-h-screen bg-ibus-blue flex flex-col relative font-roboto text-white">
  
  <!-- Top White Area (Full Width) -->
  <div class="bg-white pt-10 pb-4 w-full relative md:pt-16">
    <div class="relative w-full max-w-[420px] mx-auto flex justify-center items-center px-6">
      <!-- Back Arrow -->
      <a routerLink="/admin/dashboard" class="absolute left-6 cursor-pointer text-ibus-light-blue hover:text-ibus-yellow transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
      </a>

      <!-- Logo Title -->
      <h2 class="font-barlow font-black text-[38px] text-ibus-light-blue tracking-wide md:text-[44px]">I-BuS</h2>
    </div>
  </div>
  
  <!-- Wave Divider (Full Width) -->
  <div class="bg-white relative h-[100px] w-full -mt-[1px] md:h-[130px]">
    <svg class="absolute bottom-0 w-full h-full" viewBox="0 0 1440 200" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <path d="M0,80 C360,180 720,20 1080,130 C1260,170 1350,190 1440,170 L1440,200 L0,200 Z" fill="#175AA5" opacity="0.4"/>
      <path d="M0,110 C360,190 720,60 1080,150 C1260,180 1350,195 1440,185 L1440,200 L0,200 Z" fill="#175AA5" opacity="0.8"/>
      <path d="M0,140 C360,210 720,110 1080,170 L1440,200 L0,200 Z" fill="#081E37"/>
    </svg>
  </div>

  <!-- Bottom Dark Blue Area (Full Width) -->
  <div class="flex-1 bg-ibus-blue px-6 pb-12 flex flex-col justify-between -mt-6 z-10 md:pb-16">
    
    <div class="w-full max-w-[420px] mx-auto flex flex-col">
      <!-- Title -->
      <h1 class="font-barlow font-extrabold text-[26px] text-ibus-yellow text-center mb-4 tracking-wide md:text-[30px]">
        Gestionar Rutas
      </h1>

      <!-- Sub-management Links -->
      <div class="flex flex-wrap justify-center gap-2 mb-6 w-full max-w-[420px] mx-auto text-[12px]">
        <a routerLink="/admin/rutas/horarios" class="px-4 py-1.5 rounded-full border border-white/25 hover:bg-white/5 text-white/90 font-bold transition-all cursor-pointer">
          Horarios
        </a>
        <a routerLink="/admin/rutas/tiempos" class="px-4 py-1.5 rounded-full border border-white/25 hover:bg-white/5 text-white/90 font-bold transition-all cursor-pointer">
          Tiempos/Fechas
        </a>
        <a routerLink="/admin/rutas/detalle" class="px-4 py-1.5 rounded-full border border-white/25 hover:bg-white/5 text-white/90 font-bold transition-all cursor-pointer">
          Detalle Pasajeros
        </a>
      </div>

      <form [formGroup]="rutaForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6 w-full">
        
        <!-- Search Row -->
        <div class="flex items-center gap-3 w-full mb-2">
          <!-- Search input -->
          <div class="flex-1 flex items-center border border-white/40 rounded-lg h-[46px] px-3 bg-transparent">
            <input formControlName="buscar" type="text" placeholder="Buscar Ruta"
              class="w-full bg-transparent text-white font-roboto text-[14px] focus:outline-none placeholder-white/40 pr-2">
            <div class="text-white/60 cursor-pointer">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
              </svg>
            </div>
          </div>
          <!-- Add Button -->
          <button type="button" class="h-[46px] px-4 bg-ibus-yellow text-ibus-blue font-inter font-bold text-[14px] rounded-lg hover:bg-opacity-90 active:scale-95 transition-all whitespace-nowrap">
            + Ruta
          </button>
        </div>

        <!-- Inputs Row 1 (Id Ruta & Nombre) -->
        <div class="grid grid-cols-2 gap-4">
          <!-- Id Ruta -->
          <div class="relative w-full">
            <label class="absolute -top-[10px] left-3 bg-ibus-blue px-2 font-roboto font-bold text-[11px] text-white/80 tracking-[0.4px] z-10">
              Id Ruta
            </label>
            <div class="flex items-center border border-white/40 rounded-lg h-[50px] relative z-0">
              <input formControlName="idRuta" type="text"
                class="w-full bg-transparent text-white font-roboto text-[14px] focus:outline-none px-4">
            </div>
          </div>
          
          <!-- Nombre Ruta -->
          <div class="relative w-full">
            <label class="absolute -top-[10px] left-3 bg-ibus-blue px-2 font-roboto font-bold text-[11px] text-white/80 tracking-[0.4px] z-10">
              Nombre Ruta
            </label>
            <div class="flex items-center border border-white/40 rounded-lg h-[50px] relative z-0">
              <input formControlName="nombreRuta" type="text"
                class="w-full bg-transparent text-white font-roboto text-[14px] focus:outline-none px-4">
            </div>
          </div>
        </div>

        <!-- Inputs Row 2 (Horario & Frecuencia) -->
        <div class="grid grid-cols-2 gap-4">
          <!-- Horario -->
          <div class="relative w-full">
            <label class="absolute -top-[10px] left-3 bg-ibus-blue px-2 font-roboto font-bold text-[11px] text-white/80 tracking-[0.4px] z-10">
              Horario
            </label>
            <div class="flex items-center border border-white/40 rounded-lg h-[50px] relative z-0">
              <input formControlName="horario" type="text"
                class="w-full bg-transparent text-white font-roboto text-[14px] focus:outline-none px-4">
            </div>
          </div>
          
          <!-- Frecuencia -->
          <div class="relative w-full">
            <label class="absolute -top-[10px] left-3 bg-ibus-blue px-2 font-roboto font-bold text-[11px] text-white/80 tracking-[0.4px] z-10">
              Frecuencia
            </label>
            <div class="flex items-center border border-white/40 rounded-lg h-[50px] relative z-0">
              <input formControlName="frecuencia" type="text"
                class="w-full bg-transparent text-white font-roboto text-[14px] focus:outline-none px-4">
            </div>
          </div>
        </div>

        <!-- Empresa Select -->
        <div class="relative w-full">
          <label class="absolute -top-[10px] left-3 bg-ibus-blue px-2 font-roboto font-bold text-[11px] text-white/80 tracking-[0.4px] z-10">
            Empresa
          </label>
          <div class="flex items-center border border-white/40 rounded-lg h-[50px] relative z-0 px-4">
            <select formControlName="empresa" class="w-full bg-transparent text-white font-roboto text-[14px] focus:outline-none appearance-none cursor-pointer pr-8">
              <option value="Cootradelsol" class="bg-ibus-blue text-white">Cootradelsol</option>
              <option value="Cootransbol" class="bg-ibus-blue text-white">Cootransbol</option>
              <option value="Transsogamoso" class="bg-ibus-blue text-white">Transsogamoso</option>
            </select>
            <div class="absolute right-4 pointer-events-none text-white/60">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
              </svg>
            </div>
          </div>
        </div>

        <!-- Barrios Textarea -->
        <div class="relative w-full">
          <label class="absolute -top-[10px] left-3 bg-ibus-blue px-2 font-roboto font-bold text-[11px] text-white/80 tracking-[0.4px] z-10">
            Barrios
          </label>
          <div class="flex border border-white/40 rounded-lg min-h-[70px] relative z-0 p-3">
            <textarea formControlName="barrios" rows="2"
              class="w-full bg-transparent text-white font-roboto text-[14px] focus:outline-none resize-none"></textarea>
          </div>
        </div>

        <!-- Editar trazado box -->
        <div class="w-full border border-white/20 rounded-xl bg-white/5 py-6 px-4 flex flex-col items-center justify-center gap-2 cursor-pointer hover:bg-white/10 transition-colors mt-2">
          <svg class="w-7 h-7 text-white/80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
          </svg>
          <span class="font-inter text-[14px] text-white/80 font-medium">Editar trazado de la ruta</span>
        </div>

        <!-- Action Buttons -->
        <div class="flex justify-between items-center w-full mt-6 gap-4">
          <!-- Actualizar -->
          <button type="submit" class="flex-1 py-3 rounded-lg font-barlow font-bold text-[15px] bg-ibus-yellow text-ibus-blue hover:bg-opacity-95 active:scale-95 transition-all text-center">
            Actualizar Ruta
          </button>
          
          <!-- Eliminar -->
          <button type="button" (click)="onEliminar()" class="px-6 py-3 rounded-lg font-barlow font-bold text-[15px] bg-ibus-red text-ibus-dark-red hover:bg-opacity-95 active:scale-95 transition-all flex justify-center items-center">
            <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
            <span>Eliminar</span>
          </button>
        </div>

      </form>
    </div>

  </div>

</div>
