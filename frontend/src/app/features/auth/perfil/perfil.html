<div class="w-full min-h-screen bg-ibus-blue flex flex-col relative font-roboto">

    <!-- Top White Area (Full Width) -->
    <div class="bg-white pt-10 pb-4 w-full relative md:pt-16">
        <div class="relative w-full max-w-[420px] mx-auto flex justify-center items-center px-6">
            <!-- Back Arrow -->
            <a routerLink="/usuario/buscar-rutas"
                class="absolute left-6 cursor-pointer text-ibus-light-blue hover:text-ibus-yellow transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
            </a>

            <!-- Logo Title -->
            <h2 class="font-barlow font-black text-[38px] text-ibus-light-blue tracking-wide md:text-[44px]">I-BuS</h2>
        </div>
    </div>

    <!-- Wave Divider (Full Width) -->
    <div class="bg-white relative h-[100px] w-full -mt-[1px] md:h-[130px]">
        <svg class="absolute bottom-0 w-full h-full" viewBox="0 0 1440 200" fill="none"
            xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
            <path d="M0,80 C360,180 720,20 1080,130 C1260,170 1350,190 1440,170 L1440,200 L0,200 Z" fill="#175AA5"
                opacity="0.4" />
            <path d="M0,110 C360,190 720,60 1080,150 C1260,180 1350,195 1440,185 L1440,200 L0,200 Z" fill="#175AA5"
                opacity="0.8" />
            <path d="M0,140 C360,210 720,110 1080,170 L1440,200 L0,200 Z" fill="#081E37" />
        </svg>
    </div>

    <!-- Bottom Dark Blue Area (Full Width) -->
    <div class="flex-1 bg-ibus-blue px-6 pb-12 flex flex-col justify-between -mt-6 z-10 md:pb-16">

        <div class="w-full max-w-[420px] mx-auto flex flex-col items-center">
            <!-- Avatar overlapping waves -->
            <div
                class="w-[110px] h-[110px] rounded-full border-4 border-ibus-yellow bg-white flex justify-center items-center overflow-hidden shadow-lg -mt-[55px] z-20 md:w-[130px] md:h-[130px] md:-mt-[65px]">
                <svg class="w-16 h-16 text-ibus-light-blue md:w-20 md:h-20" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"
                        clip-rule="evenodd" />
                </svg>
            </div>

            <!-- Username -->
            <h1 class="font-inter font-bold text-[22px] text-white text-center mt-3 mb-6 md:text-[26px]">
                Usuario Pérez
            </h1>

            <!-- Content List -->
            <div class="w-full">

                <!-- Mis Favoritos Title -->
                <div class="font-inter font-bold text-[15px] text-ibus-yellow flex items-center gap-2 mb-3 mt-2">
                    <svg class="w-5 h-5 text-ibus-yellow fill-current" viewBox="0 0 20 20">
                        <path
                            d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                    </svg>
                    <span>Mis Favoritos</span>
                </div>

                <!-- Favorites list -->
                <div class="flex flex-col gap-3 max-h-[220px] overflow-y-auto pr-1 custom-scrollbar">

                    @for (fav of favoritos; track $index) {
                    <a routerLink="/usuario/buscar-rutas"
                        class="flex items-center justify-between border border-white/20 rounded-xl p-4 bg-transparent hover:bg-white/5 cursor-pointer transition-colors">
                        <div class="flex items-center gap-4">
                            <div [ngClass]="fav.tipo === 'casa' ? 'text-ibus-yellow' : 'text-ibus-light-blue'">
                                @if (fav.tipo === 'casa') {
                                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                                    <path
                                        d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z" />
                                </svg>
                                } @else {
                                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd"
                                        d="M6 6V5a3 3 0 013-3h2a3 3 0 013 3v1h2a2 2 0 012 2v3.57A22.952 22.952 0 0110 13a22.95 22.95 0 01-8-1.43V8a2 2 0 012-2h2zm2-1a1 1 0 011-1h2a1 1 0 011 1v1H8V5zm1 5a1 1 0 011-1h.01a1 1 0 110 2H10a1 1 0 01-1-1z"
                                        clip-rule="evenodd" />
                                    <path
                                        d="M2 13.692V16a2 2 0 002 2h12a2 2 0 002-2v-2.308A24.974 24.974 0 0110 15c-2.796 0-5.487-.46-8-1.308z" />
                                </svg>
                                }
                            </div>
                            <div class="flex flex-col">
                                <span class="font-inter font-bold text-[15px] text-white">{{ fav.nombre }}</span>
                                <span class="font-inter text-[12px] text-white/60">{{ fav.direccion }}</span>
                            </div>
                        </div>
                        <div class="text-white/40">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                    d="M9 5l7 7-7 7" />
                            </svg>
                        </div>
                    </a>
                    }

                </div>

                <!-- Historial de Búsqueda Title -->
                <div class="font-inter font-bold text-[15px] text-ibus-yellow flex items-center gap-2 mb-3 mt-6">
                    <svg class="w-5 h-5 text-ibus-yellow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span>Historial de Búsqueda</span>
                </div>

                <!-- Search History list -->
                <div class="flex flex-col gap-3 max-h-[220px] overflow-y-auto pr-1 custom-scrollbar">

                    @for (hist of historial; track $index) {
                    <a routerLink="/usuario/buscar-rutas"
                        class="flex items-center justify-between border border-white/20 rounded-xl p-4 bg-transparent hover:bg-white/5 cursor-pointer transition-colors">
                        <div class="flex items-center gap-4">
                            <div class="text-white">
                                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                                    <path
                                        d="M4 4a2 2 0 00-2 2v1h16V6a2 2 0 00-2-2H4zM18 9H2v5a2 2 0 002 2h12a2 2 0 002-2V9zM5 13a1 1 0 110-2 1 1 0 010 2zm10 0a1 1 0 110-2 1 1 0 010 2z" />
                                </svg>
                            </div>
                            <div class="flex flex-col">
                                <span class="font-inter font-bold text-[15px] text-white">{{ hist.ruta }}</span>
                            </div>
                        </div>
                        <div class="text-white/60 font-inter text-[12px]">
                            {{ hist.tiempo }}
                        </div>
                    </a>
                    }

                </div>

            </div>
        </div>

        <!-- Action Buttons -->
        <div class="w-full max-w-[420px] mx-auto flex flex-col items-center mt-8 gap-4">

            <!-- Cerrar Sesión Button -->
            <button (click)="onCerrarSesion()"
                class="px-6 py-2.5 rounded-xl font-inter font-bold text-[15px] bg-ibus-red text-ibus-dark-red flex items-center gap-2 hover:bg-opacity-90 active:scale-95 transition-all shadow-md">
                <svg class="w-5 h-5 text-ibus-dark-red" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                <span>Cerrar Sesión</span>
            </button>

            <!-- Eliminar Cuenta Link -->
            <button (click)="onEliminarCuenta()"
                class="font-inter text-[13px] text-white/50 hover:text-ibus-red hover:underline transition-colors mt-2">
                Eliminar Cuenta
            </button>
        </div>
    </div>
</div>
