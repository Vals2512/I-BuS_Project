<div class="w-full min-h-screen bg-ibus-blue flex flex-col relative font-roboto">
  
  <!-- Top White Area (Full Width) -->
  <div class="bg-white flex flex-col items-center pt-10 pb-4 w-full md:pt-16">
    <!-- Bus Pin Logo (SVG) -->
    <div class="relative w-[130px] h-[130px] flex justify-center items-center md:w-[150px] md:h-[150px]">
      <svg width="100%" height="100%" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Sun rays (yellow: #F9B233) on top half -->
        <g stroke="#F9B233" stroke-width="3.5" stroke-linecap="round">
          <line x1="50" y1="12" x2="50" y2="24" />
          <line x1="23" y1="23" x2="32" y2="32" />
          <line x1="77" y1="23" x2="68" y2="32" />
          <line x1="12" y1="50" x2="24" y2="50" />
          <line x1="88" y1="50" x2="76" y2="50" />
          <!-- Intermediate rays -->
          <line x1="34" y1="15" x2="39" y2="25" />
          <line x1="66" y1="15" x2="61" y2="25" />
          <line x1="15" y1="34" x2="25" y2="39" />
          <line x1="85" y1="34" x2="75" y2="39" />
        </g>

        <!-- Pin background outline. Top half yellow, bottom half blue. -->
        <path d="M50,28 C39,28 30,37 30,48 C30,63 50,83 50,83 C50,83 70,63 70,48 C70,37 61,28 50,28 Z" stroke="#175AA5" stroke-width="4.5" stroke-linejoin="round" fill="none" />
        <path d="M30,48 C30,37 39,28 50,28 C61,28 70,37 70,48" stroke="#F9B233" stroke-width="4.5" stroke-linecap="round" fill="none" />

        <!-- Inside the pin: blue bus -->
        <g fill="#175AA5">
          <!-- Bus body -->
          <path d="M39,43 C39,41 41,39 43,39 H57 C59,39 61,41 61,43 V56 C61,57 60,58 59,58 H41 C40,58 39,57 39,56 Z" />
          <!-- Windshield -->
          <rect x="42" y="42" width="16" height="6" fill="white" />
          <!-- Headlights -->
          <circle cx="45" cy="53" r="1.5" fill="#F9B233" />
          <circle cx="55" cy="53" r="1.5" fill="#F9B233" />
          <!-- Grill/Bumper -->
          <rect x="47" y="52" width="6" height="2" rx="0.5" fill="white" />
          <!-- Tires -->
          <rect x="42" y="58" width="3" height="3" rx="0.5" fill="#175AA5" />
          <rect x="55" y="58" width="3" height="3" rx="0.5" fill="#175AA5" />
        </g>
      </svg>
    </div>
    
    <!-- Logo Title -->
    <h2 class="font-barlow font-black text-[38px] text-ibus-light-blue tracking-wide mt-2 md:text-[44px]">I-BuS</h2>
  </div>
  
  <!-- Wave Divider (Full Width) -->
  <div class="bg-white relative h-[100px] w-full -mt-[1px] md:h-[130px]">
    <svg class="absolute bottom-0 w-full h-full" viewBox="0 0 1440 200" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <path d="M0,80 C360,180 720,20 1080,130 C1260,170 1350,190 1440,170 L1440,200 L0,200 Z" fill="#175AA5" opacity="0.4"/>
      <path d="M0,110 C360,190 720,60 1080,150 C1260,180 1350,195 1440,185 L1440,200 L0,200 Z" fill="#175AA5" opacity="0.8"/>
      <path d="M0,140 C360,210 720,110 1080,170 L1440,200 L0,200 Z" fill="#081E37"/>
    </svg>
  </div>

  <!-- Bottom Dark Blue Area (Full Width) -->
  <div class="flex-1 bg-ibus-blue px-6 pt-6 pb-12 flex flex-col justify-between md:pt-10 md:pb-16">
    
    <div class="w-full max-w-[420px] mx-auto">
      <!-- Iniciar Sesión Title -->
      <h1 class="font-barlow font-extrabold text-[28px] text-ibus-yellow text-center mb-8 tracking-wide md:text-[34px] md:mb-12">
        Iniciar Sesión
      </h1>

      <!-- Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6 w-full">
        
        <!-- Email Input -->
        <div class="relative w-full">
          <label class="absolute -top-[10px] left-3 bg-ibus-blue px-2 font-roboto font-bold text-[12px] text-white/80 tracking-[0.4px] z-10">
            Correo Electrónico
          </label>
          <div class="flex items-center border border-white/40 rounded-lg h-[54px] relative z-0 focus-within:border-ibus-yellow transition-colors">
            <div class="pl-4 pr-2 flex justify-center items-center text-white/60">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
            </div>
            <input formControlName="email" type="email" placeholder="ejemplo@gmail.com"
              class="w-full bg-transparent text-white font-roboto text-[15px] focus:outline-none placeholder-white/30 pr-4">
          </div>
        </div>

        <!-- Password Input -->
        <div class="relative w-full">
          <label class="absolute -top-[10px] left-3 bg-ibus-blue px-2 font-roboto font-bold text-[12px] text-white/80 tracking-[0.4px] z-10">
            Contraseña
          </label>
          <div class="flex items-center border border-white/40 rounded-lg h-[54px] relative z-0 focus-within:border-ibus-yellow transition-colors">
            <div class="pl-4 pr-2 flex justify-center items-center text-white/60">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8V7z" />
              </svg>
            </div>
            <input formControlName="password" type="password" placeholder="••••••••••••"
              class="w-full bg-transparent text-white font-roboto text-[15px] focus:outline-none placeholder-white/30 pr-4">
          </div>
        </div>

        <!-- Remember me & Forgot Password -->
        <div class="flex justify-between items-center w-full mt-1">
          <label class="flex items-center gap-2 cursor-pointer select-none">
            <input type="checkbox" formControlName="rememberMe"
              class="w-4 h-4 rounded border border-white/40 bg-transparent checked:bg-ibus-yellow accent-ibus-yellow focus:ring-0">
            <span class="font-inter text-[12px] text-white/90">Recordarme</span>
          </label>
          <a href="#" class="font-inter font-bold text-[12px] text-ibus-yellow hover:underline">
            ¿Olvidaste tu Contraseña?
          </a>
        </div>

        <!-- Submit Button -->
        <div class="flex justify-center mt-6">
          <button type="submit"
            class="px-10 py-3 rounded-lg font-barlow font-bold text-[16px] bg-ibus-yellow text-ibus-blue hover:bg-opacity-95 active:scale-95 transition-all">
            Ingresar
          </button>
        </div>

      </form>
    </div>

    <!-- Footer Link -->
    <div class="text-center mt-8">
      <p class="font-inter text-[13px] text-white/80">
        ¿No tienes una cuenta? 
        <a routerLink="/auth/registro" class="text-ibus-yellow font-bold hover:underline cursor-pointer ml-1">
          Crea una cuenta
        </a>
      </p>
    </div>

  </div>

</div>
